name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  id-token: write # This is required for requesting the JWT

jobs:
  build:
    name: Build and sync with s3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build website
        run: |-
          npx --yes mintlify export --output export.zip
          mkdir -p build
          unzip -q export.zip -d build
          # Strip files only useful for offline distribution
          rm -f build/serve.js "build/Start Docs.command" "build/Start Docs.bat" build/function-code.js

      - name: Build static search index (Pagefind)
        # Indexes the built HTML pages and writes the index + UI assets to
        # build/pagefind/. A small overlay (assets/static-search.{js,css})
        # is then injected into every page so Cmd+K and the existing
        # Mintlify search button open this local index instead of hitting
        # Mintlify's hosted search backend.
        run: |-
          npx --yes pagefind@latest --site build
          node scripts/inject-static-search.mjs build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::094284551733:role/GitHubActionsRoleStack-Role-gIAWAFX1UbPp
          aws-region: us-east-1

      - name: Upload to s3
        run: aws s3 sync ./build s3://docs.prometheux.ai --delete

      - name: Sync CloudFront viewer-request function
        # Keeps the redirectToIndexHtmlNew CloudFront function in sync with the
        # source in .github/cloudfront/. We only update + publish when the LIVE
        # code differs from the file in the repo to avoid unnecessary churn.
        run: |-
          set -euo pipefail
          FUNCTION_NAME=redirectToIndexHtmlNew
          SOURCE_FILE=.github/cloudfront/${FUNCTION_NAME}.js

          tmpdir=$(mktemp -d)
          aws cloudfront get-function \
            --name "$FUNCTION_NAME" \
            --stage LIVE \
            "$tmpdir/live.js" > /dev/null

          if cmp -s "$SOURCE_FILE" "$tmpdir/live.js"; then
            echo "CloudFront function $FUNCTION_NAME already up to date; skipping."
            exit 0
          fi

          echo "CloudFront function $FUNCTION_NAME differs from repo; updating..."
          etag=$(aws cloudfront describe-function \
            --name "$FUNCTION_NAME" \
            --query 'ETag' --output text)
          new_etag=$(aws cloudfront update-function \
            --name "$FUNCTION_NAME" \
            --function-config '{"Comment":"Rewrite paths to directory-style index.html for Mintlify export","Runtime":"cloudfront-js-2.0"}' \
            --function-code "fileb://${SOURCE_FILE}" \
            --if-match "$etag" \
            --query 'ETag' --output text)
          aws cloudfront publish-function \
            --name "$FUNCTION_NAME" \
            --if-match "$new_etag" > /dev/null
          echo "Published $FUNCTION_NAME to LIVE."

      - name: Invalidate cloudfront
        run: |-
          aws cloudfront create-invalidation \
            --distribution-id E2HIWF1TR6OEBH \
            --paths "/*"
